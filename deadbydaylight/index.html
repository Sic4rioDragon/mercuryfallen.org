<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MercuryFallen • Dead by Daylight</title>
  <meta name="description" content="MercuryFallen — Dead by Daylight" />

  <!-- Reuse main site vibe -->
  <link rel="icon" href="../assets/icons/mercuryfallen_logo.png" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg">
    <div class="noise" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
  </div>

  <header class="topbar">
    <a class="brand" href="/" aria-label="Back to home">
      <img class="brand__logo" src="../assets/icons/mercuryfallen_logo.png" alt="MercuryFallen logo" />
      <span class="brand__text">MercuryFallen</span>
    </a>
  </header>

  <main class="container">
    <section class="dbdHeader">
      <h1 class="dbdTitle">Dead by Daylight</h1>
      <p class="dbdSub">Favorite Characters</p>
      <div class="dbdActions">
        <a class="btn btn--ghost" href="/challenges/">You want to pick a challenge? Here you can do that.</a>
      </div>
    </section>

    <section class="dbdGrid" aria-label="DBD Characters">
  <article class="charCard" id="dwightCard">
  <div class="charImgWrap">
    <div class="prestigeBadge" id="prestigeBadge" aria-label="Prestige">
      <img class="prestigeFill" id="prestigeFill" alt="" />
      <img class="prestigeBorder" id="prestigeBorder" alt="" />
      <div class="prestigeNum" id="prestigeNum"></div>
    </div>

    <img class="charImg" src="../assets/images/dino_dwight.png" alt="Dwight Fairfield (Dino Dwight)" />
  </div>

  <div class="charMeta">
    <div class="charName">Dwight Fairfield</div>

    <div class="loadouts" aria-label="Favorite loadouts">
      <div class="loadoutBlock">
        <div class="loadoutTitle">
          Fav Loadout 1 <span class="loadoutName" id="l1name"></span>
        </div>
        <div class="loadout" id="loadout1">
          <a class="slot" id="l1perk1" target="_blank" rel="noreferrer"><img alt="Perk 1"></a>
          <a class="slot" id="l1perk2" target="_blank" rel="noreferrer"><img alt="Perk 2"></a>
          <a class="slot" id="l1perk3" target="_blank" rel="noreferrer"><img alt="Perk 3"></a>
          <a class="slot" id="l1perk4" target="_blank" rel="noreferrer"><img alt="Perk 4"></a>
        </div>
      </div>

      <div class="loadoutBlock">
        <div class="loadoutTitle">
          Fav Loadout 2 <span class="loadoutName" id="l2name"></span>
        </div>
        <div class="loadout" id="loadout2">
          <a class="slot" id="l2perk1" target="_blank" rel="noreferrer"><img alt="Perk 1"></a>
          <a class="slot" id="l2perk2" target="_blank" rel="noreferrer"><img alt="Perk 2"></a>
          <a class="slot" id="l2perk3" target="_blank" rel="noreferrer"><img alt="Perk 3"></a>
          <a class="slot" id="l2perk4" target="_blank" rel="noreferrer"><img alt="Perk 4"></a>

          <span class="pillText" id="l2item"></span>
          <span class="pillText" id="l2offering"></span>
        </div>
      </div>
    </div>
  </div>
</article>

<article class="charCard" id="wraithCard">
  <div class="charImgWrap">
    <div class="prestigeBadge" id="wraithPrestigeBadge" aria-label="Prestige">
      <img class="prestigeFill" id="wraithPrestigeFill" alt="" />
      <img class="prestigeBorder" id="wraithPrestigeBorder" alt="" />
      <div class="prestigeNum" id="wraithPrestigeNum"></div>
    </div>

    <img class="charImg" src="../assets/images/wraith.png" alt="The Wraith" />
  </div>

  <div class="charMeta">
    <div class="charName">The Wraith</div>

    <div class="loadouts" aria-label="Favorite loadouts">
      <div class="loadoutBlock">
        <div class="loadoutTitle">
          Fav Loadout 1 <span class="loadoutName" id="w1name"></span>
        </div>
        <div class="loadout" id="wloadout1">
          <a class="slot" id="w1perk1" target="_blank" rel="noreferrer"><img alt="Perk 1"></a>
          <a class="slot" id="w1perk2" target="_blank" rel="noreferrer"><img alt="Perk 2"></a>
          <a class="slot" id="w1perk3" target="_blank" rel="noreferrer"><img alt="Perk 3"></a>
          <a class="slot" id="w1perk4" target="_blank" rel="noreferrer"><img alt="Perk 4"></a>
        </div>
      </div>

      <div class="loadoutBlock">
        <div class="loadoutTitle">
          Fav Loadout 2 <span class="loadoutName" id="w2name"></span>
        </div>
        <div class="loadout" id="wloadout2">
          <a class="slot" id="w2perk1" target="_blank" rel="noreferrer"><img alt="Perk 1"></a>
          <a class="slot" id="w2perk2" target="_blank" rel="noreferrer"><img alt="Perk 2"></a>
          <a class="slot" id="w2perk3" target="_blank" rel="noreferrer"><img alt="Perk 3"></a>
          <a class="slot" id="w2perk4" target="_blank" rel="noreferrer"><img alt="Perk 4"></a>

          <span class="pillText" id="w2item"></span>
          <span class="pillText" id="w2offering"></span>
        </div>
      </div>
    </div>
  </div>
</article>
</section>

    <footer class="footer">
      <span>mercuryfallen.org</span>
      <span class="dot">•</span>
      <span><a href="/" class="footerLink">home</a></span>
    </footer>
  </main>
  <script src="./script.js"></script>
</body>
</html>
