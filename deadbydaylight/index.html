<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MercuryFallen • Dead by Daylight</title>
  <meta name="description" content="MercuryFallen — Dead by Daylight" />

  <!-- Reuse main site vibe -->
  <link rel="icon" href="../assets/icons/mercuryfallen_logo.png" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg">
    <div class="noise" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
  </div>

  <header class="topbar">
    <a class="brand" href="/" aria-label="Back to home">
      <img class="brand__logo" src="../assets/icons/mercuryfallen_logo.png" alt="MercuryFallen logo" />
      <span class="brand__text">MercuryFallen</span>
    </a>
  </header>

  <main class="container">
    <section class="dbdHeader">
      <h1 class="dbdTitle">Dead by Daylight</h1>
      <p class="dbdSub">Just Dwight. For now.</p>
    </section>

    <section class="dbdGrid" aria-label="DBD Characters">
  <article class="charCard" id="dwightCard" data-full="../assets/images/dino_dwight.png">
    <img class="prestigeCrest" id="prestigeCrest" alt="Prestige crest" />

    <div class="charImgWrap">
      <img class="charImg" src="../assets/images/dino_dwight.png" alt="Dwight Fairfield (Dino Dwight)" />
    </div>

    <div class="charMeta">
      <div class="charName">Dwight Fairfield</div>
      <div class="charTag">Survivor</div>

      <div class="loadout" aria-label="Favorite loadout">
        <a class="slot" id="perk1" target="_blank" rel="noreferrer"><img alt="Perk 1"></a>
        <a class="slot" id="perk2" target="_blank" rel="noreferrer"><img alt="Perk 2"></a>
        <a class="slot" id="perk3" target="_blank" rel="noreferrer"><img alt="Perk 3"></a>
        <a class="slot" id="perk4" target="_blank" rel="noreferrer"><img alt="Perk 4"></a>

        <div class="slotSep"></div>

        <a class="slot" id="item" target="_blank" rel="noreferrer"><img alt="Item"></a>
        <a class="slot" id="addon1" target="_blank" rel="noreferrer"><img alt="Add-on 1"></a>
        <a class="slot" id="addon2" target="_blank" rel="noreferrer"><img alt="Add-on 2"></a>
        <a class="slot" id="offering" target="_blank" rel="noreferrer"><img alt="Offering"></a>
      </div>
    </div>
  </article>
</section>

<!-- Click-to-view modal -->
<div class="modal" id="imgModal" aria-hidden="true">
  <button class="modal__backdrop" id="modalClose" aria-label="Close"></button>
  <div class="modal__panel" role="dialog" aria-modal="true">
    <img id="modalImg" alt="Preview" />
  </div>
</div>

    <footer class="footer">
      <span>mercuryfallen.org</span>
      <span class="dot">•</span>
      <span><a href="/" class="footerLink">home</a></span>
    </footer>
  </main>
  <script src="./script.js"></script>
</body>
</html>
