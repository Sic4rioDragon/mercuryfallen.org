<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://mercuryfallen.org/deadbydaylight/">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>DBD Killers — MercuryFallen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="../assets/icons/mercuryfallen_logo.png">

  <meta name="description" content="MercuryFallen Dead by Daylight killers — collection, prestige and builds.">
  <meta property="og:title" content="Dead by Daylight • Killers • MercuryFallen">
  <meta property="og:description" content="Killer collection — prestige + builds.">
  <meta property="og:image" content="https://mercuryfallen.org/assets/images/wraith.png">
  <meta property="og:url" content="https://mercuryfallen.org/deadbydaylight/">
  <meta name="twitter:card" content="summary_large_image">
</head>

<body>
  <div class="topbar">
    <a class="back-btn" href="https://mercuryfallen.org/">← Back to Home</a>

    <div class="titleblock">
      <div class="title-row">
        <a class="title-avatar-link" href="/deadbydaylight/survivors.html" title="Go to Survivors">
          <img class="title-avatar" src="../assets/images/dino_dwight.png" alt="Survivors">
        </a>

        <div class="title-text">
          <h1>Dead by Daylight</h1>
          <p>Mercury’s killer collection</p>
        </div>

        <a class="title-avatar-link" href="/deadbydaylight/" title="Go to Killers">
          <img class="title-avatar" src="../assets/images/wraith.png" alt="Killers">
        </a>
      </div>
    </div>

    <div style="width:140px;"></div>
  </div>

  <div class="controls">
    <input id="searchInput" class="search" type="search" placeholder="Search killers… (e.g. huntress, oni, spirit)" autocomplete="off">
  </div>

  <main id="killer-grid"></main>

  <footer>
    <p id="updated"></p>
    <button id="toggleNamesBtn" class="toggle-btn" type="button">Turn names off</button>
  </footer>

  <div id="killerModal" class="modal hidden">
    <div class="modal-card">
      <button id="modalClose" class="modal-close">×</button>
      <h2 id="modalName"></h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
